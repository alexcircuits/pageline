<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5865f2"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#e6e8ff" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="256" height="256" rx="56" fill="url(#g)"/>

  <!-- Subtle inner glow -->
  <rect x="2" y="2" width="252" height="252" rx="55" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2"/>

  <!-- Open book / page mark -->
  <g filter="url(#shadow)">
    <!-- Left page -->
    <path d="M64 72
             C 64 68, 67 64, 72 64
             L 120 64
             C 124 64, 128 68, 128 72
             L 128 192
             C 116 184, 96 180, 72 180
             C 67 180, 64 176, 64 172 Z"
          fill="url(#page)"/>
    <!-- Right page -->
    <path d="M192 72
             C 192 68, 189 64, 184 64
             L 136 64
             C 132 64, 128 68, 128 72
             L 128 192
             C 140 184, 160 180, 184 180
             C 189 180, 192 176, 192 172 Z"
          fill="url(#page)" fill-opacity="0.92"/>
    <!-- Spine line -->
    <line x1="128" y1="68" x2="128" y2="190" stroke="#5865f2" stroke-width="2.5" stroke-opacity="0.55" stroke-linecap="round"/>
  </g>

  <!-- Bookmark ribbon (the "line" in Pageline) -->
  <path d="M150 64 L150 132 L162 122 L174 132 L174 64 Z"
        fill="#ff5d73" stroke="#a8344a" stroke-width="1.5" stroke-linejoin="round"/>
</svg>
